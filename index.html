<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Source Code Of Spin Wheel</title>
    <!---------------  CSS  --------------------->
    <link rel="stylesheet" href="style.css" />
    <!---------------  Font Aewsome  --------------------->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
      integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!---------------  Chart JS  --------------------->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <!---------------  Chart JS Plugin  --------------------->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.1.0/chartjs-plugin-datalabels.min.js"></script>
  </head>
  <body>
    <div id="current-round" class="current-round">Round 1</div>
    <div class="container">
      <div class="wheel_box">
        <canvas id="spinWheel"></canvas>
        <button id="spin_btn">धर्मचक्र</button>
        <i class="fa-solid fa-location-arrow"></i>
      </div>
    </div>
    <div class="round-buttons">
      <button>Round 1</button>
      <button>Round 2</button>
      <button>Round 3</button>
      <button>Round 4</button>
    </div>
    <div id="text"></div>
    <!---------------  SCRIPT  --------------------->
    <script src="script.js"></script>
  </body>
</html>
